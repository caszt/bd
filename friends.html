<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Send a Greeting to Ahleah</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=Dancing+Script:wght@400;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
  /* ═══════════════════════════════════════════════
     LUXURY CORRESPONDENCE - FRIENDS GREETING PAGE
     ═══════════════════════════════════════════════ */

  :root {
    --page-bg1: #0f0205;
    --page-bg2: #1a0308;
    --page-bg3: #250510;
    --page-accent: #ff1a2e;
    --page-gold: #f9e4a0;
    --page-rose: #ff8090;
    --page-text: #ffeef0;
    --page-text-soft: rgba(255,238,240,0.8);
  }

  * {
    box-sizing: border-box;
  }

  body {
    font-family: 'Lora', serif;
    background:
      radial-gradient(ellipse at 20% 30%, rgba(255,26,46,0.15) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 70%, rgba(249,228,160,0.1) 0%, transparent 50%),
      linear-gradient(135deg, var(--page-bg1) 0%, var(--page-bg2) 50%, var(--page-bg3) 100%);
    color: var(--page-text);
    margin: 0;
    padding: 2rem;
    min-height: 100vh;
    position: relative;
    overflow-x: hidden;
  }

  /* Decorative background elements */
  body::before {
    content: '';
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-image:
      radial-gradient(circle at 25% 25%, rgba(255,128,144,0.05) 2px, transparent 2px),
      radial-gradient(circle at 75% 75%, rgba(249,228,160,0.03) 1px, transparent 1px);
    background-size: 80px 80px, 120px 120px;
    pointer-events: none;
    z-index: -1;
  }

  /* Floating decorative elements */
  .floating-element {
    position: absolute;
    pointer-events: none;
    opacity: 0.6;
    animation: float 8s ease-in-out infinite;
  }

  .floating-element:nth-child(1) {
    top: 10%;
    left: 10%;
    font-size: 2rem;
    animation-delay: 0s;
  }

  .floating-element:nth-child(2) {
    top: 20%;
    right: 15%;
    font-size: 1.5rem;
    animation-delay: 2s;
  }

  .floating-element:nth-child(3) {
    bottom: 25%;
    left: 20%;
    font-size: 1.8rem;
    animation-delay: 4s;
  }

  .floating-element:nth-child(4) {
    bottom: 15%;
    right: 10%;
    font-size: 1.3rem;
    animation-delay: 6s;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0px) rotate(0deg); }
    25% { transform: translateY(-10px) rotate(5deg); }
    50% { transform: translateY(-20px) rotate(-3deg); }
    75% { transform: translateY(-10px) rotate(2deg); }
  }

  h1 {
    font-family: 'Dancing Script', cursive;
    font-size: clamp(3rem, 8vw, 5rem);
    color: var(--page-gold);
    margin-bottom: 3rem;
    text-align: center;
    position: relative;
    text-shadow:
      0 0 20px rgba(249,228,160,0.5),
      0 0 40px rgba(249,228,160,0.3),
      0 2px 4px rgba(0,0,0,0.5);
    letter-spacing: 2px;
    animation: titleGlow 3s ease-in-out infinite alternate;
  }

  @keyframes titleGlow {
    from { text-shadow: 0 0 20px rgba(249,228,160,0.5), 0 0 40px rgba(249,228,160,0.3), 0 2px 4px rgba(0,0,0,0.5); }
    to { text-shadow: 0 0 30px rgba(249,228,160,0.8), 0 0 50px rgba(249,228,160,0.5), 0 2px 4px rgba(0,0,0,0.5); }
  }

  /* Main correspondence card */
  .correspondence-card {
    background:
      linear-gradient(145deg, rgba(255,26,46,0.1) 0%, rgba(249,228,160,0.05) 100%),
      linear-gradient(135deg, rgba(31,3,8,0.95) 0%, rgba(58,6,16,0.95) 100%);
    border: 2px solid;
    border-image: linear-gradient(45deg, var(--page-accent), var(--page-gold), var(--page-rose)) 1;
    border-radius: 20px;
    padding: 3rem 2.5rem;
    max-width: 600px;
    width: 100%;
    position: relative;
    backdrop-filter: blur(10px);
    box-shadow:
      0 25px 50px rgba(0,0,0,0.5),
      0 0 0 1px rgba(255,26,46,0.2),
      inset 0 1px 0 rgba(255,255,255,0.1);
    animation: cardEntrance 1.2s cubic-bezier(0.25, 0.46, 0.45, 0.94) 0.3s both;
  }

  @keyframes cardEntrance {
    0% {
      opacity: 0;
      transform: translateY(50px) rotateX(10deg) scale(0.9);
    }
    100% {
      opacity: 1;
      transform: translateY(0) rotateX(0deg) scale(1);
    }
  }

  /* Decorative corner elements */
  .correspondence-card::before,
  .correspondence-card::after {
    content: '✦';
    position: absolute;
    color: var(--page-gold);
    font-size: 1.5rem;
    opacity: 0.7;
    animation: sparkle 4s ease-in-out infinite;
  }

  .correspondence-card::before {
    top: -10px;
    left: -10px;
  }

  .correspondence-card::after {
    bottom: -10px;
    right: -10px;
    animation-delay: 2s;
  }

  @keyframes sparkle {
    0%, 100% { transform: scale(1) rotate(0deg); opacity: 0.7; }
    50% { transform: scale(1.2) rotate(180deg); opacity: 1; }
  }

  .form-section {
    margin-bottom: 2.5rem;
  }

  .section-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.4rem;
    color: var(--page-gold);
    margin-bottom: 1.5rem;
    font-weight: 700;
    position: relative;
    display: inline-block;
  }

  .section-title::after {
    content: '';
    position: absolute;
    bottom: -5px;
    left: 0;
    width: 100%;
    height: 2px;
    background: linear-gradient(90deg, var(--page-accent), var(--page-gold));
    border-radius: 1px;
  }

  label {
    display: block;
    margin-bottom: 0.75rem;
    color: var(--page-rose);
    font-weight: 600;
    font-size: 0.95rem;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  input, textarea {
    width: 100%;
    padding: 1rem 1.25rem;
    border: 1px solid rgba(249,228,160,0.3);
    border-radius: 12px;
    background: rgba(255,255,255,0.05);
    color: var(--page-text);
    font-family: 'Lora', serif;
    font-size: 1rem;
    transition: all 0.3s ease;
    backdrop-filter: blur(5px);
  }

  input:focus, textarea:focus {
    outline: none;
    border-color: var(--page-gold);
    background: rgba(255,255,255,0.08);
    box-shadow:
      0 0 20px rgba(249,228,160,0.2),
      0 0 0 2px rgba(249,228,160,0.1);
    transform: translateY(-2px);
  }

  input::placeholder, textarea::placeholder {
    color: rgba(255,238,240,0.5);
    font-style: italic;
  }

  textarea {
    height: 150px;
    resize: vertical;
    line-height: 1.6;
  }

  .anonymous-toggle {
    display: flex;
    align-items: center;
    margin-bottom: 1.5rem;
    padding: 1rem;
    background: rgba(255,255,255,0.02);
    border-radius: 10px;
    border: 1px solid rgba(249,228,160,0.2);
  }

  .anonymous-toggle input {
    width: auto;
    margin-right: 0.75rem;
    accent-color: var(--page-accent);
  }

  .anonymous-toggle label {
    margin: 0;
    font-size: 1rem;
    text-transform: none;
    letter-spacing: normal;
  }

  .send-button {
    background:
      linear-gradient(135deg, var(--page-accent) 0%, var(--scarlet1) 50%, var(--page-accent) 100%),
      linear-gradient(135deg, rgba(249,228,160,0.1) 0%, transparent 100%);
    color: var(--page-text);
    border: 2px solid var(--page-gold);
    padding: 1.25rem 3rem;
    border-radius: 50px;
    cursor: pointer;
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    font-weight: 700;
    transition: all 0.4s ease;
    width: 100%;
    text-transform: uppercase;
    letter-spacing: 1px;
    position: relative;
    overflow: hidden;
    box-shadow:
      0 8px 25px rgba(255,26,46,0.3),
      0 0 0 1px rgba(249,228,160,0.2);
  }

  .send-button::before {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
    transition: left 0.6s ease;
  }

  .send-button:hover {
    transform: translateY(-3px);
    box-shadow:
      0 15px 35px rgba(255,26,46,0.4),
      0 0 30px rgba(249,228,160,0.3);
  }

  .send-button:hover::before {
    left: 100%;
  }

  .send-button:active {
    transform: translateY(-1px);
  }

  .status {
    margin-top: 2rem;
    padding: 1.25rem;
    border-radius: 12px;
    text-align: center;
    font-weight: 600;
    backdrop-filter: blur(10px);
    animation: statusAppear 0.5s ease-out;
  }

  @keyframes statusAppear {
    0% {
      opacity: 0;
      transform: translateY(20px) scale(0.95);
    }
    100% {
      opacity: 1;
      transform: translateY(0) scale(1);
    }
  }

  .success {
    background: linear-gradient(135deg, rgba(40,167,69,0.2), rgba(34,197,94,0.1));
    color: #d4edda;
    border: 1px solid rgba(40,167,69,0.3);
    box-shadow: 0 0 20px rgba(40,167,69,0.2);
  }

  .error {
    background: linear-gradient(135deg, rgba(220,53,69,0.2), rgba(239,68,68,0.1));
    color: #f8d7da;
    border: 1px solid rgba(220,53,69,0.3);
    box-shadow: 0 0 20px rgba(220,53,69,0.2);
  }

  .info {
    background: linear-gradient(135deg, rgba(249,228,160,0.1), rgba(212,168,67,0.05));
    color: var(--page-gold);
    border: 1px solid rgba(249,228,160,0.3);
  }
  </style>
</head>
<body>
  <!-- Floating decorative elements -->
  <div class="floating-element">✦</div>
  <div class="floating-element">❋</div>
  <div class="floating-element">✦</div>
  <div class="floating-element">❋</div>

  <h1>Send a Special Greeting</h1>

  <div class="correspondence-card">
    <form id="messageForm">

      <div class="form-section">
        <div class="section-title">Your Identity</div>
        <div class="anonymous-toggle">
          <input type="checkbox" id="anonymous" name="anonymous">
          <label for="anonymous">Send this anonymously</label>
        </div>

        <label for="sender">Your Name</label>
        <input type="text" id="sender" name="sender" placeholder="Leave blank if anonymous">
      </div>

      <div class="form-section">
        <div class="section-title">Your Message</div>
        <label for="content">Write your heartfelt greeting</label>
        <textarea id="content" name="content" required placeholder="Pour your heart into these words..."></textarea>
      </div>

      <button type="submit" class="send-button">Send with Love 💌</button>

    </form>
  </div>

  <div id="status" class="status" style="display: none;"></div>

<!-- Supabase SDK -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  // REPLACE THESE WITH YOUR SUPABASE PROJECT DETAILS
  // Find them at: Supabase Dashboard → Settings → API
  const SUPABASE_URL = 'https://dulhnhngbkkjoblxvkim.supabase.co';
  const SUPABASE_ANON_KEY = 'sb_publishable_U1a3ESaIHh0iyc-lvux-EA_u0mQs3Qo';

  // Initialize Supabase
  const { createClient } = window.supabase;
  const supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  // Function to save message
  async function saveMessage(senderName, content, isAnonymous) {
    try {
      const { data, error } = await supabaseClient
        .from('messages')
        .insert([
          {
            sender: isAnonymous ? 'Anonymous Friend' : senderName || 'Anonymous Friend',
            content: content,
            timestamp: new Date().toISOString(),
            read: false
          }
        ]);

      if (error) {
        console.error('Error saving message:', error);
        return { success: false, error: error.message };
      }

      return { success: true };
    } catch (error) {
      console.error('Error saving message:', error);
      return { success: false, error: error.message };
    }
  }



  // Form submission
  document.getElementById('messageForm').addEventListener('submit', async (e) => {
    e.preventDefault();

    const sender = document.getElementById('sender').value.trim();
    const content = document.getElementById('content').value.trim();
    const isAnonymous = document.getElementById('anonymous').checked;

    const statusDiv = document.getElementById('status');
    statusDiv.style.display = 'none';
    statusDiv.textContent = 'Sending...';
    statusDiv.className = 'status';
    statusDiv.style.display = 'block';

    // Disable button during send
    const button = document.querySelector('button[type="submit"]');
    button.disabled = true;
    button.textContent = 'Sending...';

    if (!content) {
      statusDiv.textContent = 'Please enter a message!';
      statusDiv.className = 'status error';
      return;
    }

    try {
      const result = await saveMessage(sender, content, isAnonymous);

    if (result.success) {
      statusDiv.textContent = 'Your greeting has been sent! 🎉';
      statusDiv.className = 'status success';
      document.getElementById('messageForm').reset();
      button.disabled = false;
      button.textContent = 'Send Greeting';
    } else {
      statusDiv.textContent = `Failed to send: ${result.error}`;
      statusDiv.className = 'status error';
      console.error('Send failed:', result.error);
      button.disabled = false;
      button.textContent = 'Send Greeting';
    }
    } catch (error) {
      statusDiv.textContent = `Error: ${error.message}`;
      statusDiv.className = 'status error';
      console.error('Form submission error:', error);
      button.disabled = false;
      button.textContent = 'Send Greeting';
    }
  });

  setTimeout(() => statusDiv.style.display = 'none', 5000);
</script>
</body>
</html></content>
