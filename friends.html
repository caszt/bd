<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Send a Greeting to Your Friend 🎉</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
  body {
    font-family: 'Lora', serif;
    background: linear-gradient(135deg, #1a0d22, #2e0d28, #3d1535);
    color: #f7ccd8;
    margin: 0;
    padding: 2rem;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  h1 {
    font-size: 2.5rem;
    color: #f9e4a0;
    margin-bottom: 2rem;
    text-align: center;
  }

  form {
    background: rgba(60, 20, 50, 0.8);
    padding: 2rem;
    border-radius: 12px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    border: 1px solid rgba(212, 168, 67, 0.3);
    max-width: 500px;
    width: 100%;
  }

  label {
    display: block;
    margin-bottom: 0.5rem;
    color: #f7ccd8;
    font-weight: 600;
  }

  input, textarea {
    width: 100%;
    padding: 0.8rem;
    margin-bottom: 1rem;
    border: 1px solid rgba(212, 168, 67, 0.3);
    border-radius: 8px;
    background: rgba(255, 255, 255, 0.1);
    color: #f9e4a0;
    font-family: 'Lora', serif;
  }

  textarea {
    height: 120px;
    resize: vertical;
  }

  button {
    background: linear-gradient(135deg, #7b2560, #a83070);
    color: #f9e4a0;
    border: 1px solid rgba(212, 168, 67, 0.5);
    padding: 1rem 2rem;
    border-radius: 50px;
    cursor: pointer;
    font-family: 'Lora', serif;
    font-size: 1rem;
    transition: all 0.3s ease;
    width: 100%;
  }

  button:hover {
    background: linear-gradient(135deg, #9a2870, #c04080);
    transform: translateY(-2px);
    box-shadow: 0 5px 15px rgba(0,0,0,0.3);
  }

  .anonymous-toggle {
    display: flex;
    align-items: center;
    margin-bottom: 1rem;
  }

  .anonymous-toggle input {
    width: auto;
    margin-right: 0.5rem;
  }

  .status {
    margin-top: 1rem;
    padding: 0.5rem;
    border-radius: 8px;
    text-align: center;
  }

  .success {
    background: rgba(100, 200, 100, 0.2);
    color: #d4edda;
    border: 1px solid #28a745;
  }

  .error {
    background: rgba(220, 53, 69, 0.2);
    color: #f8d7da;
    border: 1px solid #dc3545;
  }
</style>
</head>
<body>
<h1>Send a Special Greeting 🎉</h1>

<form id="messageForm">
  <div class="anonymous-toggle">
    <input type="checkbox" id="anonymous" name="anonymous">
    <label for="anonymous">Send anonymously</label>
  </div>

  <label for="sender">Your Name (optional if anonymous):</label>
  <input type="text" id="sender" name="sender" placeholder="Enter your name or leave blank">

  <label for="content">Your Message:</label>
  <textarea id="content" name="content" required placeholder="Write your birthday wish here..."></textarea>

  <button type="submit">Send Greeting</button>
</form>

  <div id="status" class="status" style="display: none;"></div>

  <div style="margin-top: 2rem; text-align: center; color: rgba(249, 228, 160, 0.6); font-size: 0.9rem;">
    <p>Debug info: Check browser console (F12) for errors</p>
    <button type="button" onclick="testConnection()" style="background: rgba(212, 168, 67, 0.3); border: 1px solid rgba(212, 168, 67, 0.5); color: #f9e4a0; padding: 0.5rem 1rem; border-radius: 8px; cursor: pointer; margin-top: 0.5rem;">Test Supabase Connection</button>
  </div>

<!-- Supabase SDK -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  // REPLACE THESE WITH YOUR SUPABASE PROJECT DETAILS
  // Find them at: Supabase Dashboard → Settings → API
  const SUPABASE_URL = 'https://dulhnhngbkkjoblxvkim.supabase.co';
  const SUPABASE_ANON_KEY = 'sb_publishable_U1a3ESaIHh0iyc-lvux-EA_u0mQs3Qo';

  // Initialize Supabase
  const { createClient } = window.supabase;
  const supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  // Function to save message
  async function saveMessage(senderName, content, isAnonymous) {
    try {
      const { data, error } = await supabaseClient
        .from('messages')
        .insert([
          {
            sender: isAnonymous ? 'Anonymous Friend' : senderName || 'Anonymous Friend',
            content: content,
            timestamp: new Date().toISOString(),
            read: false
          }
        ]);

      if (error) {
        console.error('Error saving message:', error);
        return { success: false, error: error.message };
      }

      return { success: true };
    } catch (error) {
      console.error('Error saving message:', error);
      return { success: false, error: error.message };
    }
  }

  // Test Supabase connection
  window.testConnection = async function() {
    try {
      console.log('Testing Supabase connection...');
      const { data, error } = await supabaseClient
        .from('messages')
        .insert([
          {
            sender: 'Connection Test',
            content: 'Testing Supabase connection',
            timestamp: new Date().toISOString(),
            read: true
          }
        ]);

      if (error) {
        console.error('Supabase connection failed:', error);
        alert('❌ Supabase Error: ' + error.message + '\n\n🔧 Check:\n1. Supabase URL and anon key\n2. Database table exists\n3. RLS policies are set');
      } else {
        console.log('✅ Supabase connection successful!');
        alert('🎉 Supabase connection works! Messages should send now.');
      }
    } catch (error) {
      console.error('Connection test failed:', error);
      alert('❌ Connection Error: ' + error.message + '\n\nTry refreshing the page and testing again.');
    }
  }

  // Form submission
  document.getElementById('messageForm').addEventListener('submit', async (e) => {
    e.preventDefault();

    const sender = document.getElementById('sender').value.trim();
    const content = document.getElementById('content').value.trim();
    const isAnonymous = document.getElementById('anonymous').checked;

    const statusDiv = document.getElementById('status');
    statusDiv.style.display = 'none';
    statusDiv.textContent = 'Sending...';
    statusDiv.className = 'status';
    statusDiv.style.display = 'block';

    // Disable button during send
    const button = document.querySelector('button[type="submit"]');
    button.disabled = true;
    button.textContent = 'Sending...';

    if (!content) {
      statusDiv.textContent = 'Please enter a message!';
      statusDiv.className = 'status error';
      return;
    }

    try {
      const result = await saveMessage(sender, content, isAnonymous);

    if (result.success) {
      statusDiv.textContent = 'Your greeting has been sent! 🎉';
      statusDiv.className = 'status success';
      document.getElementById('messageForm').reset();
      button.disabled = false;
      button.textContent = 'Send Greeting';
    } else {
      statusDiv.textContent = `Failed to send: ${result.error}`;
      statusDiv.className = 'status error';
      console.error('Send failed:', result.error);
      button.disabled = false;
      button.textContent = 'Send Greeting';
    }
    } catch (error) {
      statusDiv.textContent = `Error: ${error.message}`;
      statusDiv.className = 'status error';
      console.error('Form submission error:', error);
      button.disabled = false;
      button.textContent = 'Send Greeting';
    }
  });

  setTimeout(() => statusDiv.style.display = 'none', 5000);
</script>
</body>
</html></content>
